<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <!-- 预连接关键 API 和资源域名，省去 TLS 握手时间 -->
    <link rel="preconnect" href="https://server.lris625.top">
    <link rel="preconnect" href="https://ech0.lris625.top">
    <link rel="preconnect" href="https://v1.hitokoto.cn">
    <link rel="preconnect" href="https://restapi.amap.com">
    <link rel="preconnect" href="https://geoapi.qweather.com">
    <link rel="preconnect" href="https://devapi.qweather.com">
    <link rel="preconnect" href="https://pic1.imgdb.cn">
    <link rel="dns-prefetch" href="https://pic.imgdb.cn">
    <link rel="dns-prefetch" href="https://img.shields.io">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <script src="config.js"></script>
    <script>
        (function() {
            var r = document.documentElement;
            if (CONFIG.fontSize_name) r.style.setProperty('--font-size-name', CONFIG.fontSize_name);
            if (CONFIG.fontSize_bio) r.style.setProperty('--font-size-bio', CONFIG.fontSize_bio);
            if (CONFIG.fontSize_hitokoto) r.style.setProperty('--font-size-hitokoto', CONFIG.fontSize_hitokoto);
            if (CONFIG.fontSize_body) r.style.setProperty('--font-size-body', CONFIG.fontSize_body);
        })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--网站标题-->
    <script>
        // 设置页面标题
        document.title = CONFIG.title;
    </script>

    <script>
        // 设置网站图标
        const link = document.createElement('link');
        link.rel = 'icon';
        link.href = CONFIG.icon;
        link.type = 'image/png';
        document.head.appendChild(link);
    </script>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!--个性化字体--> 
    <script>
        const fontLink = document.createElement('link');
        fontLink.rel = 'stylesheet';
        fontLink.href = CONFIG.font;
        fontLink.type = 'text/css';
        document.head.appendChild(fontLink);
    </script>

    <!--busuanzi国内接口-->
    <script src="https://cn.vercount.one/js" async></script>

    <!-- Umami 统计脚本 -->
    <script>
        const umamiScript = document.createElement('script');
        umamiScript.defer = true;
        umamiScript.src = CONFIG.umami_domain + '/script.js';  // 注意：需要完整的脚本URL
        umamiScript.setAttribute('data-website-id', CONFIG.umami_id);
        umamiScript.async = true;  // 通常也加上async
        document.head.appendChild(umamiScript);
    </script>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const umamiScript = document.querySelector(`script[src="${CONFIG.umami_domain}/script.js"]`);
            if (umamiScript && CONFIG && CONFIG.umami_id) {
                umamiScript.setAttribute('data-website-id', CONFIG.umami_id);
                
            }
        });
    </script>

    <script>
        // 切换弹窗显示/隐藏
        function toggleModal() {
            const modal = document.getElementById('settingsModal');
            if (modal.style.display === 'flex') {
                modal.style.display = 'none';
            } else {
                modal.style.display = 'flex';
            }
        }

        // 点击遮罩层空白处也可关闭
        window.onclick = function(event) {
            const modal = document.getElementById('settingsModal');
            if (event.target == modal) {
                modal.style.display = "none";
            }
        }
    </script>

    <style>
        :root {
            --accent-color: #64ffda;
            --glass-bg: rgba(20, 20, 20, 0.25);
            --border: 1px solid rgba(255, 255, 255, 0.1);
            --trans-fast: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            --container-max-width: 1200px;
            --compact-max-width: 550px;
            --font-size-name: 1.8rem;
            --font-size-bio: 0.95rem;
            --font-size-hitokoto: 0.95rem;
            --font-size-body: 0.9;
        }

        /* 全局布局 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            
        }

        /* 修改后的 body 样式 */
        body {
            font-family: 'LXGW WenKai Screen', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 20px;
            zoom: var(--font-size-body);
            transition: justify-content 0.5s ease;
            
            /* --- 背景图由 JS 动态设置 (CONFIG.background) --- */
            background: no-repeat center center fixed;
            background-size: cover;
            color: white; /* 确保文字是白的，不会变成纯黑主题感 */
        }

        /* 确保遮罩层正常工作，这样背景才不会太刺眼 */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5); /* 调整这里的 0.5 可以控制背景明暗 */
            z-index: -1; /* 确保在最底层 */
            pointer-events: none;
        }

        .dashboard {
            display: flex;
            gap: 24px;
            max-width: 1200px;
            width: 100%;
            height: 100%;
            flex-wrap: wrap;
            align-items: center;
            margin-top: 10px;
            margin-bottom: 30px;
            /* 为页脚留出空间 */
            position: relative;
            z-index: 1;
            transition: max-width 0.5s ease, transform 0.3s ease; /* 增加平滑过渡 */
        }

        .col-left, .col-right {
            flex: 1;
            min-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            justify-content: flex-start;
            /* 移除 min-height: 700px; */
        }

        /* 通用卡片 */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border: var(--border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            width: 100%;
            display: flex;
            flex-direction: column;
            /* --- 以下是关键修改点 --- */
            flex-grow: 0;           /* 确保卡片不会被强制拉长 */
            flex-shrink: 1;         /* 防止卡片被压缩 */
            height: fit-content;    /* 高度根据内容自动撑开 */
        }

        /* 个人信息 */
        .profile {
            text-align: center;
            width: 100%;
            padding-bottom: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .avatar-wrapper {
            width: 110px;
            height: 110px;
            min-width: 110px;
            min-height: 110px;
            border-radius: 50%;
            border: 3px solid var(--accent-color);
            margin-bottom: 10px;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
            border-radius: 50%;
            transition: var(--trans-fast);
        }

        .avatar-wrapper:hover .avatar {
            transform: rotate(360deg);
        }

        .name {
            font-size: var(--font-size-name);
            margin-bottom: 10px;
            font-weight: bold;
        }

        .bio {
            font-size: var(--font-size-bio);
            color: #ccc;
            line-height: 1.6;
            margin-bottom: 25px;
        }

        /* 社交账号 */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 12px;
            margin-top: 10px;
        }

        .social-item {
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: var(--border);
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 1.1rem;
            transition: var(--trans-fast);
        }

        .social-item:hover {
            background: rgba(100, 255, 218, 0.1);
            color: var(--accent-color);
            border-color: var(--accent-color);
            transform: translateY(-3px);
        }

        /* 监控条 */
        .stat-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 15px;
            font-size: 0.9rem;
            font-weight: bold;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
            box-shadow: 0 0 10px #00ff88;
        }

        .progress-item {
            margin-bottom: 15px;
        }

        .progress-label {
            display: flex;
            justify-content: space-between;
            font-size: 0.8rem;
            margin-bottom: 6px;
            color: #ddd;
        }

        .progress-bg {
            background: rgba(255, 255, 255, 0.1);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent-color), #4facfe);
            transition: width 1s ease;
            border-radius: 4px;
        }

        /* 快捷入口 */
        .link-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr); /* 固定5列，防止换行 */
            gap: 12px;
        }

        .grid-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 15px 5px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            text-decoration: none;
            color: white;
            border: 1px solid transparent;
            transition: var(--trans-fast);
        }

        .grid-item:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: var(--accent-color);
            transform: translateY(-5px);
        }

        .grid-icon {
            width: 32px;
            height: 32px;
            margin-bottom: 8px;
            border-radius: 6px;
        }

        .grid-item span {
            font-size: 0.75rem;
        }

        /* 一言 */
        .hitokoto-text {
            font-size: var(--font-size-hitokoto);
            line-height: 1.6;
            color: #eee;
            text-align: left;
        }
        .hitokoto-source {
            font-size: 1.0rem;
            font-weight: bold;
            font-style: normal;
            color: #ccc;
            margin-top: 8px;
            text-align: right;
        }

        .small-widgets {
            display: flex;
            gap: 15px;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }

        .widget-box {
            flex: 1;
            text-align: center;
        }

        .widget-val {
            font-size: 1.1rem;
            font-weight: bold;
            display: block;
        }

        .widget-label {
            font-size: 0.65rem;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* 页脚样式 */
        .footer {
            width: 100%;
            max-width: 1200px;
            text-align: center;
            padding: 25px;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.6);
            margin-top: auto;
            margin-bottom: 20px;
            margin-left: auto;
            margin-right: auto;
        }

        .badge-list {
            display: flex;
            justify-content: center;
            gap: 6px;
            flex-wrap: wrap;
            margin-top: 12px;
            opacity: 0.8;
        }

        .badge-list img {
            height: 20px;
        }

        /* GitHub贡献图样式 */
        .github-chart-img {
            width: 100%;
            max-width: 100%;
            border-radius: 12px;
            margin-top: 15px;
            display: block;
        }

        .github-chart-container {
            overflow-x: auto;
            margin-top: 15px;
            border-radius: 12px;
            max-width: 100%;
        }

        .github-chart-caption {
            font-size: 0.8rem;
            color: #aaa;
            text-align: center;
            margin-top: 10px;
        }

        /* 最新说说卡片样式 */
        .echo-container {
            margin-top: 15px;
            min-height: 120px;
        }

        .echo-loading {
            text-align: center;
            padding: 30px 0;
            color: #aaa;
            font-size: 0.9rem;
        }

        .echo-item {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 12px;
            border: 1px solid transparent;
            transition: var(--trans-fast);
        }

        .echo-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 107, 107, 0.3);
        }

        .echo-content {
            font-size: 0.9rem;
            line-height: 1.6;
            color: #eee;
            margin-bottom: 10px;
            word-break: break-word;
        }

        .echo-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            color: #888;
        }

        .echo-time {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .echo-likes {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #64ffda;
        }

        .echo-footer {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .echo-link {
            color: #64ffda;
            text-decoration: none;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 5px;
            transition: var(--trans-fast);
        }

        .echo-link:hover {
            color: #4aff7a;
            text-decoration: underline;
        }

        .echo-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            margin-top: 8px;
        }

        .echo-tag {
            background: rgba(100, 255, 218, 0.1);
            color: #64ffda;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 0.7rem;
            border: 1px solid rgba(100, 255, 218, 0.2);
        }

        @media (max-width: 768px) {
            .dashboard {
                flex-direction: column;
                align-items: center;
            }

            body {
                padding: 20px 10px;
            }

            .col-left, .col-right {
                min-width: unset;
                width: 92%;
            }

            .glass-card {
                width: 100%;
            }

            .footer {
                width: 92%;
                max-width: 92%;
            }

            .link-grid {
                grid-template-columns: repeat(3, 1fr);
            }

            .echo-meta {
                flex-direction: column;
                align-items: flex-start;
                gap: 5px;
            }
        }

        /* 弹窗遮罩层 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(8px);
            display: none; /* 初始隐藏 */
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        /* 弹窗内容体 */
        .modal-content {
            max-width: 400px;
            width: 90%;
            animation: modalFadeIn 0.3s ease;
        }

        @keyframes modalFadeIn {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            margin-left: auto;
            cursor: pointer;
            font-size: 1.5rem;
            color: #888;
            transition: var(--trans-fast);
        }

        .close-btn:hover {
            color: var(--accent-color);
        }

        /* 弹窗内条目样式 */
        .setting-item {
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px;
        }
        
        .dashboard, .footer {
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .dashboard.compact-mode {
            max-width: 550px; /* 增加宽度 */
            margin-top: 0;
            margin-bottom: 20px;
        }

        .footer.compact-mode {
            max-width: 1200px;
            position: absolute;
            bottom: 20px; /* ← 只改这里调节页脚距底部的距离，不影响卡片位置 */
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* 紧凑模式下的个人信息卡片优化 */
        .dashboard.compact-mode .glass-card {
            padding: 20px; /* 减少内边距 */
        }
        
        .dashboard.compact-mode .profile {
            padding-bottom: 0px; /* 减少底部内边距 */
        }
        
        .dashboard.compact-mode .avatar-wrapper {
            width: 100px;
            height: 100px;
            min-width: 100px;
            min-height: 100px;
            margin-bottom: 0px;
        }
        
        .dashboard.compact-mode .name {
            font-size: 2.0rem; /* 缩小名字字体 */
            margin-bottom: 8px;
        }
        
        .dashboard.compact-mode .bio {
            font-size: 0.85rem; /* 缩小简介字体 */
            margin-bottom: 15px;
            line-height: 0.5;
        }
        
        .dashboard.compact-mode .social-item {
            width: 34px; /* 缩小社交图标 */
            height: 34px;
            font-size: 1rem;
        }
        
       
        
    </style>
</head>

<div id="settingsModal" class="modal-overlay">
    <div class="glass-card modal-content">
        <div class="stat-header">
            <i class="fas fa-th-large"></i>
            <span>看板布局管理 / Layout</span>
            <span class="close-btn" onclick="toggleModal()">&times;</span>
        </div>
        <div style="padding: 10px 0; font-size: 0.9rem;">
            <div class="setting-item"><span>一言统计</span><input type="checkbox" id="check-hitokoto" checked onchange="toggleSection('hitokoto-card', this.checked)"></div>
            <div class="setting-item"><span>最新说说</span><input type="checkbox" id="check-echo" checked onchange="toggleSection('echo-card', this.checked)"></div>
            <div class="setting-item"><span>系统监控</span><input type="checkbox" id="check-monitor" checked onchange="toggleSection('monitor-card', this.checked)"></div>
            <div class="setting-item"><span>快捷入口</span><input type="checkbox" id="check-links" checked onchange="toggleSection('links-card', this.checked)"></div>
            <div class="setting-item"><span>Github图</span><input type="checkbox" id="check-github" checked onchange="toggleSection('github-card', this.checked)"></div>

            <div style="display: flex; justify-content: center; width: 100%; margin-top: 20px;">
                <button style="border: 1px solid var(--accent-color); padding: 8px 30px; border-radius: 12px; background: rgba(100, 255, 218, 0.1); color: var(--accent-color); cursor: pointer; text-decoration: none; font-size: 0.85rem; transition: var(--trans-fast);" onclick="toggleModal()">
                    保存配置
                </button>
            </div>
        </div>
    </div>
</div>

<body>

    <div class="dashboard">
        <div class="col-left">
            <div class="glass-card">
                <div class="profile">
                    <div class="avatar-wrapper">
                        <img class="avatar" alt="Avatar" id="avatar-img">
                    </div>
                    <h2 class="name">LucasAndrew</h2>
                    <p class="bio"><br><script>document.write(CONFIG.aphorism1);</script></p>
                    <div class="social-links">
                        <a href=CONFIG.github_url target="_blank" class="social-item"
                            title="GitHub"><i class="fab fa-github"></i></a>
                        <a href=CONFIG.email_url class="social-item" title="Email"><i
                                class="fas fa-envelope"></i></a>
                        <a href="javascript:void(0);" class="social-item" title="设置" onclick="toggleModal()"><i 
                                class="fas fa-cog"></i></a>
                    </div>
                </div>
            </div>

            <div class="glass-card" id="hitokoto-card">
                <div id="hitokoto_text" class="hitokoto-text">正在摘取星辰...</div>
                <div class="small-widgets">
                    <div class="widget-box">
                        <span id="busuanzi_value_site_pv" class="widget-val">1</span>
                        <span class="widget-label">访客 PV</span>
                    </div>
                    <div class="widget-box">
                        <span id="temp-val" class="widget-val">--</span>
                        <span id="loc-val" class="widget-label">城市</span>
                    </div>
                </div>
            </div>

            <!-- 最新说说卡片 -->
            <div class="glass-card" id="echo-card">
                <div class="stat-header">
                    <div class="status-dot" style="background: #64ffda;"></div>
                    <span>最新碎碎念 / Latest Thinking</span>
                </div>
                <div id="echo-container" class="echo-container">
                    <div class="echo-loading">正在加载最新说说...</div>
                </div>
                <div class="echo-footer">
                    <a href=CONFIG.echoApiUrl target="_blank" class="echo-link">
                        查看更多碎碎念 <i class="fas fa-external-link-alt"></i>
                    </a>
                </div>
            </div>
        </div>

        <div class="col-right">
            <div class="glass-card" id="monitor-card">
                <div class="stat-header">
                    <div class="status-dot"></div>
                    <span>系统监控 (Real-time Status)</span>
                </div>
                <div class="progress-item">
                    <div class="progress-label"><span>CPU 负载</span> <span id="cpu-val">0%</span></div>
                    <div class="progress-bg">
                        <div class="progress-bar" id="cpu-bar"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-label"><span>内存使用</span> <span id="ram-val">0%</span></div>
                    <div class="progress-bg">
                        <div class="progress-bar" id="ram-bar"
                            style="background: linear-gradient(90deg, #fce38a, #f38181);"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-label"><span>磁盘空间</span> <span id="disk-val">0%</span></div>
                    <div class="progress-bg">
                        <div class="progress-bar" id="disk-bar"
                            style="background: linear-gradient(90deg, #a8edea, #fed6e3);"></div>
                    </div>
                </div>
                <div class="progress-item">
                    <div class="progress-label"><span>续费倒计时</span> <span id="days-val">-- 天</span></div>
                    <div class="progress-bg">
                        <div class="progress-bar" id="days-bar"></div>
                    </div>
                </div>
                <div
                    style="display: flex; justify-content: space-between; font-size: 0.7rem; color: #888; margin-top: 5px;">
                    <span><i class="fas fa-download"></i> <span id="net-in">0</span></span>
                    <span id="uptime-val">UPTIME: LOADING</span>
                    <span><i class="fas fa-upload"></i> <span id="net-out">0</span></span>
                </div>

            <div class="glass-card" id="links-card">

    <script>
        // 格式化字节大小
        function formatBytes(bytes) {
            if (!bytes || bytes === 0) return '0 B';
            const units = ['B', 'KB', 'MB', 'GB', 'TB'];
            const i = Math.floor(Math.log(bytes) / Math.log(1024));
            return (bytes / Math.pow(1024, i)).toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
        }

        // 构建 Komari API 地址（支持绝对URL和Nginx反代两种模式）
        function komariUrl(path) {
            const base = CONFIG.komariApiUrl.replace(/\/+$/, '');
            if (base.startsWith('http')) {
                return base + '/api' + path;
            }
            return base + path;
        }

        // 1. 系统状态更新 (优先 Komari API，回退到 status.php)
        function updateStatus() {
            if (CONFIG.komariApiUrl && CONFIG.komariNodeUuid) {
                const url = komariUrl('/recent/' + CONFIG.komariNodeUuid);
                fetch(url)
                    .then(res => {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(res => {
                        const status = res.data && res.data[0];
                        if (!status) { console.warn('[Komari 系统状态] ⚠️ 返回数据为空'); return; }
                        const cpu = Math.round(status.cpu.usage * 10) / 10;
                        const mem = status.ram.total ? Math.round(status.ram.used / status.ram.total * 1000) / 10 : 0;
                        const disk = status.disk.total ? Math.round(status.disk.used / status.disk.total * 1000) / 10 : 0;
                        const net_down = status.network ? formatBytes(status.network.totalDown) : '0 B';
                        const net_up = status.network ? formatBytes(status.network.totalUp) : '0 B';
                        const uptimeSec = status.uptime || 0;
                        const d = Math.floor(uptimeSec / 86400);
                        const h = Math.floor((uptimeSec % 86400) / 3600);
                        const m = Math.floor((uptimeSec % 3600) / 60);
                        let uptimeStr = d > 0 ? d + '天 ' + h + '小时 ' + m + '分' : h + '小时 ' + m + '分';

                        document.getElementById('cpu-val').innerText = cpu + '%';
                        document.getElementById('cpu-bar').style.width = cpu + '%';
                        document.getElementById('ram-val').innerText = mem + '%';
                        document.getElementById('ram-bar').style.width = mem + '%';
                        document.getElementById('disk-val').innerText = disk + '%';
                        document.getElementById('disk-bar').style.width = disk + '%';
                        document.getElementById('net-in').innerText = net_down;
                        document.getElementById('net-out').innerText = net_up;
                        document.getElementById('uptime-val').innerText = 'UP: ' + uptimeStr.toUpperCase();
                        console.log('[Komari 系统状态] ✅ 获取成功 | CPU: ' + cpu + '% | 内存: ' + mem + '% | 磁盘: ' + disk + '% | 下行: ' + net_down + ' | 上行: ' + net_up);
                    }).catch(e => console.error('[Komari 系统状态] ❌ 获取失败:', e.message, '| 请求地址:', url));
            } else {
                fetch('status.php')
                    .then(res => {
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(data => {
                        document.getElementById('cpu-val').innerText = data.cpu + '%';
                        document.getElementById('cpu-bar').style.width = data.cpu + '%';
                        document.getElementById('ram-val').innerText = data.mem + '%';
                        document.getElementById('ram-bar').style.width = data.mem + '%';
                        document.getElementById('disk-val').innerText = data.disk + '%';
                        document.getElementById('disk-bar').style.width = data.disk + '%';
                        document.getElementById('net-in').innerText = data.net_in + ' KB/s';
                        document.getElementById('net-out').innerText = data.net_out + ' KB/s';
                        document.getElementById('uptime-val').innerText = 'UP: ' + data.uptime.toUpperCase();
                        document.getElementById('days-val').innerText = data.days_left + ' 天';
                        document.getElementById('days-bar').style.width = Math.min((data.days_left / 30) * 100, 100) + '%';
                        console.log('[status.php 系统状态] ✅ 获取成功 | CPU: ' + data.cpu + '% | 内存: ' + data.mem + '% | 磁盘: ' + data.disk + '% | 续费: ' + data.days_left + '天');
                    }).catch(e => console.error('[status.php 系统状态] ❌ 获取失败:', e.message));
            }
        }

        // 1.1 续费倒计时更新 (通过 Komari nodes API 获取 expired_at)
        function updateBilling() {
            if (!CONFIG.komariApiUrl || !CONFIG.komariNodeUuid) return;
            const url = komariUrl('/nodes');
            fetch(url)
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(res => {
                    const node = res.data && res.data.find(n => n.uuid === CONFIG.komariNodeUuid);
                    if (!node) { console.warn('[Komari 续费信息] ⚠️ 未找到节点 ' + CONFIG.komariNodeUuid); return; }
                    if (!node.expired_at) { console.warn('[Komari 续费信息] ⚠️ 节点未设置到期时间'); return; }
                    const expired = new Date(node.expired_at);
                    const now = new Date();
                    const daysLeft = Math.max(0, Math.ceil((expired - now) / (1000 * 60 * 60 * 24)));
                    document.getElementById('days-val').innerText = daysLeft + ' 天';
                    document.getElementById('days-bar').style.width = Math.min((daysLeft / 30) * 100, 100) + '%';
                    console.log('[Komari 续费信息] ✅ 获取成功 | 到期: ' + node.expired_at + ' | 剩余: ' + daysLeft + '天 | 计费周期: ' + (node.billing_cycle || '未设置') + '天');
                }).catch(e => console.error('[Komari 续费信息] ❌ 获取失败:', e.message, '| 请求地址:', url));
        }

        // 2. 运行时间计算 (精确到天)
        function calculateRuntime() {
            const startDate = new Date(CONFIG.up_date);
            const today = new Date();
            const timeDiff = today - startDate;
            const days = Math.floor(timeDiff / (1000 * 60 * 60 * 24));
            document.getElementById('runtime-val').innerText = `已在西洲停留 ${days} 个昼夜`;
            console.log('[运行时间] ✅ 计算成功 | 起始: ' + CONFIG.up_date + ' | 已运行: ' + days + '天');
        }

        // 3. 天气更新 (高德 IP 定位 + 和风天气)
        async function updateWeather() {
            if (!CONFIG.qweatherKey || !CONFIG.amapKey) {
                console.warn('[天气] ⚠️ 未配置和风天气或高德地图 API Key，跳过');
                return;
            }
            try {
                const amapRes = await fetch(`https://restapi.amap.com/v3/ip?key=${CONFIG.amapKey}`);
                const amapData = await amapRes.json();
                let cityName = (amapData.status === '1' && typeof amapData.city === 'string') ? amapData.city : '北京';
                console.log('[天气] 高德IP定位成功 | 城市: ' + cityName);

                const geoRes = await fetch(`https://geoapi.qweather.com/v2/city/lookup?location=${encodeURIComponent(cityName)}&key=${CONFIG.qweatherKey}`);
                const geoData = await geoRes.json();

                if (geoData.code === '200' && geoData.location) {
                    const locationId = geoData.location[0].id;
                    const displayCity = geoData.location[0].name;
                    const weatherRes = await fetch(`https://devapi.qweather.com/v7/weather/now?location=${locationId}&key=${CONFIG.qweatherKey}`);
                    const weatherData = await weatherRes.json();

                    if (weatherData.code === '200') {
                        document.getElementById('temp-val').innerText = weatherData.now.temp + '°C';
                        document.getElementById('loc-val').innerText = displayCity + ' · ' + weatherData.now.text;
                        console.log('[天气] ✅ 获取成功 | ' + displayCity + ' | ' + weatherData.now.temp + '°C | ' + weatherData.now.text);
                    } else {
                        console.warn('[天气] ⚠️ 和风天气API返回异常 | code: ' + weatherData.code);
                    }
                } else {
                    console.warn('[天气] ⚠️ 城市查询失败 | 城市: ' + cityName + ' | code: ' + geoData.code);
                }
            } catch (e) {
                document.getElementById('temp-val').innerText = "N/A";
                document.getElementById('loc-val').innerText = "定位失败";
                console.error('[天气] ❌ 获取失败:', e.message);
            }
        }

        // 4. 一言更新
        function updateHitokoto() {

        // 5. 更新GitHub贡献图说明
        function updateGitHubChartInfo() {
            fetch('github_contributions.php')
                .then(res => {
                    if (!res.ok) throw new Error('HTTP ' + res.status);
                    return res.json();
                })
                .then(data => {
                    if (data && data.last_updated) {
                        const lastUpdated = new Date(data.last_updated);

                        let updateText = '数据已缓存';
                        if (diffHours < 1) {

                .catch(error => {
                    console.error('[GitHub 贡献图] ❌ 加载失败，使用备用图片:', error.message);

        // 贡献图点击显示提交信息（移动端支持）
        function setupChartTouch(container) {
            // 创建提示框元素
            let tooltip = document.getElementById('chart-tooltip');
            if (!tooltip) {
                tooltip = document.createElement('div');
                tooltip.id = 'chart-tooltip';
                tooltip.style.cssText = 'position:fixed;padding:8px 14px;background:rgba(0,0,0,0.85);color:#fff;border-radius:8px;font-size:0.8rem;z-index:9999;pointer-events:none;display:none;white-space:nowrap;backdrop-filter:blur(4px);';
                document.body.appendChild(tooltip);
            }

            const rects = container.querySelectorAll('svg rect[data-date]');
            rects.forEach(rect => {
                rect.style.cursor = 'pointer';
                rect.addEventListener('click', function(e) {
                    e.preventDefault();
                    const date = this.getAttribute('data-date');
                    const count = this.getAttribute('data-count') || this.querySelector('title')?.textContent?.match(/\d+/)?.[0] || '0';
                    tooltip.textContent = `${date}：${count} 次提交`;
                    tooltip.style.display = 'block';

                    const rectBounds = this.getBoundingClientRect();
                    tooltip.style.left = rectBounds.left + rectBounds.width / 2 - tooltip.offsetWidth / 2 + 'px';
                    tooltip.style.top = rectBounds.top - tooltip.offsetHeight - 8 + 'px';

                    clearTimeout(tooltip._timer);
                    tooltip._timer = setTimeout(() => { tooltip.style.display = 'none'; }, 3000);
                });
            });

            // 如果没有 data-date 属性，改用 title 元素的内容
            if (rects.length === 0) {
                const allRects = container.querySelectorAll('svg rect');
                allRects.forEach(rect => {
                    const titleEl = rect.querySelector('title');
                    if (!titleEl) return;
                    rect.style.cursor = 'pointer';
                    rect.addEventListener('click', function(e) {
                        e.preventDefault();
                        const text = titleEl.textContent || '';
                        tooltip.textContent = text;
                        tooltip.style.display = 'block';

                        const rectBounds = this.getBoundingClientRect();
                        tooltip.style.left = rectBounds.left + rectBounds.width / 2 - tooltip.offsetWidth / 2 + 'px';
                        tooltip.style.top = rectBounds.top - tooltip.offsetHeight - 8 + 'px';

                        clearTimeout(tooltip._timer);
                        tooltip._timer = setTimeout(() => { tooltip.style.display = 'none'; }, 3000);
                    });
                });
            }
        }

        // 7. 加载最新Ech0说说
        function loadLatestEcho() {
            const container = document.getElementById('echo-container');
            if (!container) return;
            
            container.innerHTML = '<div class="echo-loading">正在加载最新说说...</div>';
            
            if (!CONFIG.echoApiUrl) {
                console.warn('[说说] ⚠️ 未配置 Echo API 地址，跳过');
                container.innerHTML = '<div class="echo-loading">未配置说说 API</div>';
                return;
            }
            
            const params = new URLSearchParams({ page: '1', pageSize: '1' });
            const url = CONFIG.echoApiUrl + '?' + params;
            
            fetch(url, {
                headers: { 'Accept': 'application/json', 'Content-Type': 'application/json' }
            })
                .then(response => {
                    if (!response.ok) throw new Error('HTTP ' + response.status);
                    return response.json();
                })
                .then(data => {
                    let echoes = null;
                    
                    if (data.code === 1 && data.data && data.data.items && Array.isArray(data.data.items)) {
                        echoes = data.data.items;
                    } else if (data.code === 1 && data.data && Array.isArray(data.data)) {
                        echoes = data.data;
                    } else if (data.data && data.data.data && Array.isArray(data.data.data)) {
                        echoes = data.data.data;
                    } else if (Array.isArray(data)) {
                        echoes = data;
                    } else if (data.data && Array.isArray(data.data)) {
                        echoes = data.data;
                    } else if (data.echoes && Array.isArray(data.echoes)) {
                        echoes = data.echoes;
                    } else if (data.items && Array.isArray(data.items)) {
                        echoes = data.items;
                    }
                    
                    if (echoes && echoes.length > 0) {
                        renderEchoes(echoes, container);
                        const preview = echoes[0].content ? echoes[0].content.substring(0, 20) : '';
                        console.log('[说说] ✅ 获取成功 | 条数: ' + echoes.length + ' | 最新: ' + preview + '...');
                    } else {
                        console.warn('[说说] ⚠️ 数据格式不匹配', Object.keys(data));
                        throw new Error('未找到说说数据');
                    }
                })
                .catch(error => {
                    console.error('[说说] ❌ 获取失败:', error.message, '| 请求地址:', url);
                    container.innerHTML = '<div class="echo-loading">说说加载失败: ' + error.message + '</div>';
                });
        }

        // 渲染说说列表
        function renderEchoes(echoes, container) {
            if (!echoes || echoes.length === 0) {
                container.innerHTML = `
                    <div class="echo-loading">
                        暂无说说内容
                    </div>
                `;
                return;
            }
            
            let html = '';
            
            echoes.forEach(echo => {
                // 格式化时间
                const createdAt = echo.created_at ? formatTime(echo.created_at) : '未知时间';
                
                // 处理标签
                let tagsHtml = '';
                if (echo.tags && Array.isArray(echo.tags) && echo.tags.length > 0) {
                    tagsHtml = '<div class="echo-tags">';
                    echo.tags.forEach(tag => {
                        if (tag.name) {
                            tagsHtml += `<span class="echo-tag">${tag.name}</span>`;
                        }
                    });
                    tagsHtml += '</div>';
                }
                
                // 处理内容 - 限制长度并处理换行
                let content = echo.content || '';
                if (content.length > 120) {
                    content = content.substring(0, 120) + '...';
                }
                content = content.replace(/\n/g, '<br>');
                
                html += `
                    <div class="echo-item">
                        <div class="echo-content">${content}</div>
                        ${tagsHtml}
                        <div class="echo-meta">
                            <div class="echo-time">
                                <i class="far fa-clock"></i>
                                <span>${createdAt}</span>
                            </div>
                            <div class="echo-likes">
                                <i class="fas fa-heart"></i>
                                <span>${echo.fav_count || 0}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }

        // 格式化时间
        function formatTime(timeString) {
            try {
                const date = new Date(timeString);
                const now = new Date();
                const diffMs = now - date;
                const diffMins = Math.floor(diffMs / (1000 * 60));
                const diffHours = Math.floor(diffMs / (1000 * 60 * 60));
                const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                
                if (diffMins < 1) {
                    return '刚刚';
                } else if (diffMins < 60) {
                    return `${diffMins}分钟前`;
                } else if (diffHours < 24) {
                    return `${diffHours}小时前`;
                } else if (diffDays < 7) {
                    return `${diffDays}天前`;
                } else {
                    // 超过一周显示具体日期
                    return date.toLocaleDateString('zh-CN', {
                        month: 'short',
                        day: 'numeric'
                    });
                }
            } catch (e) {
                return '未知时间';
            }
        }

        // 1. 核心切换函数 - 修复保存问题
        function toggleSection(sectionId, isVisible) {
            const element = document.getElementById(sectionId);
            if (element) {
                element.style.display = isVisible ? 'flex' : 'none';
                // 保存状态到本地 - 使用字符串存储
                localStorage.setItem('config_' + sectionId, isVisible.toString());
                initLayout(); // 每次切换状态后重新计算布局
            }
        }

        // 增强版布局初始化逻辑 - 修复逻辑错误
       function initLayout() {
            const sections = ['hitokoto-card', 'echo-card', 'monitor-card', 'links-card', 'github-card'];
            let visibleCount = 0;
            
            sections.forEach(id => {
                const saved = localStorage.getItem('config_' + id);
                const el = document.getElementById(id);
                const isVisible = saved === null ? true : (saved === 'true');
                
                if (el) {
                    el.style.display = isVisible ? 'flex' : 'none';
                    if (isVisible) visibleCount++;
                }
                
                const checkbox = document.getElementById('check-' + id.split('-')[0]);
                if (checkbox) checkbox.checked = isVisible;
            });

            const body = document.body;
            const dashboard = document.querySelector('.dashboard');
            const colRight = document.querySelector('.col-right');
            const footer = document.querySelector('.footer');

            if (visibleCount === 0) {
                // --- 紧凑居中模式 ---
                body.style.justifyContent = 'center'; // body 负责垂直居中
                dashboard.classList.add('compact-mode');
                if(footer) footer.classList.add('compact-mode');
                if(colRight) colRight.style.display = 'none'; // 隐藏空的右侧列，防止偏移
            } else {
                // --- 正常列表模式 ---
                body.style.justifyContent = 'flex-start';
                dashboard.classList.remove('compact-mode');
                if(footer) footer.classList.remove('compact-mode');
                if(colRight) colRight.style.display = 'flex';
            }
        }

        // 每30秒刷一次系统状态（Komari 节点数据 1 分钟更新一次）
        setInterval(updateStatus, 30000);
        // 每10分钟刷一次续费倒计时
        setInterval(updateBilling, 600000);
        
        // 每2小时更新一次贡献图数据
        setInterval(loadGitHubChart, 7200000);
        
        // 每30分钟更新一次说说数据
        setInterval(loadLatestEcho, 1800000);

        // 在页面加载完成后执行初始化（script 在 body 末尾，DOM 已就绪）
        initLayout();

        const avatarImg = document.getElementById('avatar-img');
        if (avatarImg) {
            if (CONFIG.avartar && CONFIG.avartar.trim() !== '') {
                avatarImg.src = CONFIG.avartar;
            } else {
                avatarImg.style.display = 'none';
            }
        }

        console.log('========== API 初始化 ==========');
        console.log('[系统状态] ' + (CONFIG.komariApiUrl ? 'Komari (' + CONFIG.komariApiUrl + ')' : 'status.php (本地)'));
        console.log('[续费信息] ' + (CONFIG.komariApiUrl ? 'Komari (' + CONFIG.komariNodeUuid + ')' : 'status.php (本地)'));
        console.log('[天气] ' + (CONFIG.qweatherKey ? '已配置 (和风+高德)' : '❌ 未配置'));
        console.log('[一言] ' + '已启用 (hitokoto.cn)');
        console.log('[GitHub] ' + '已启用 (github_contributions.php)');
        console.log('[说说] ' + (CONFIG.echoApiUrl ? '已配置 (' + CONFIG.echoApiUrl + ')' : '❌ 未配置'));
        console.log('[运行时间] ' + (CONFIG.up_date ? '起始: ' + CONFIG.up_date : '❌ 未配置'));
        console.log('===============================');

        updateStatus();
        updateBilling();
        calculateRuntime();
        updateWeather();
        updateHitokoto();
        loadLatestEcho();
        loadGitHubChart();
        document.body.style.backgroundImage = `url(${CONFIG.background})`;

        document.addEventListener('click', function(e) {
            if (!e.target.closest('svg rect')) {
                const tooltip = document.getElementById('chart-tooltip');
                if (tooltip) tooltip.style.display = 'none';
            }
        });
    </script>

</body>

</html>
